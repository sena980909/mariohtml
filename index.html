// ============================================================
// MAIN LOOP
// ============================================================
let lastTime = 0, accumulator = 0;
const FRAME_TIME = 1000/60;

function gameLoop(timestamp) {
  requestAnimationFrame(gameLoop);
  if (!lastTime) { lastTime = timestamp; return; }
  let dt = timestamp - lastTime;
  lastTime = timestamp;
  if (dt > 100) dt = 100;
  accumulator += dt;

  let updates = 0;
  while (accumulator >= FRAME_TIME && updates < 5) {
    update();
    accumulator -= FRAME_TIME;
    updates++;
  }
  render();
}

function update() {
  globalTimer++;

  switch (gameState) {
    case 'title':
      if (isJump() && !jumpWasPressed) {
        ensureAudio();
        score = 0; coins = 0; lives = 3; currentLevelIndex = 0;
        initLevel(0);
        gameState = 'livesScreen'; stateTimer = 120;
      }
      jumpWasPressed = isJump();
      break;

    case 'livesScreen':
      stateTimer--;
      if (stateTimer <= 0) { gameState = 'playing'; startBGM(); fadeAlpha = 1; fadeDir = -1; }
      break;

    case 'playing':
      updatePlayer();
      handleFireball();
      updateFireballs();
      updateEntities();
      checkPlayerEnemyCollision();
      updateItems();
      updateParticles();
      // Boss system
      if (bossState === 'active') {
        updateBowser();
        updateBowserProjectiles();
        checkFireballHitBowser();
        checkAxeCollision();
        checkPlayerBowserCollision();
      } else if (bossState === 'bridge_collapse') {
        updateBridgeCollapse();
        updateBowserProjectiles();
      } else if (bossState === 'bowser_falling') {
        if (bowser) { bowser.vy += GRAVITY; bowser.y += bowser.vy; }
        updateBowserProjectiles();
      } else if (bossState === 'victory') {
        updateBossVictory();
      } else {
        checkFlagpole();
      }
      if (keys['Escape'] || keys['KeyP']) {
        gameState = 'paused'; keys['Escape'] = false; keys['KeyP'] = false; stopBGM();
      }
      break;

    case 'paused':
      if (keys['Escape'] || keys['KeyP']) {
        gameState = 'playing'; keys['Escape'] = false; keys['KeyP'] = false; startBGM();
      }
      break;

    case 'flagpole':
      updateFlagpole(); updateParticles();
      break;

    case 'dying':
      player.vy += GRAVITY;
      player.y += player.vy;
      stateTimer--;
      // Die when timer expires OR player has fallen well off screen
      if (stateTimer <= 0 || player.y > level.height * TILE + 64) {
        lives--;
        if (lives <= 0) { gameState = 'gameOver'; stateTimer = 60; }
        else { initLevel(currentLevelIndex); gameState = 'livesScreen'; stateTimer = 120; }
      }
      break;

    case 'gameOver':
      if (score > highScore) { highScore = score; localStorage.setItem('marioHighScore', String(highScore)); }
      if (stateTimer > 0) stateTimer--;
      if (stateTimer <= 0 && isJump() && !jumpWasPressed) {
        gameState = 'title';
      }
      jumpWasPressed = isJump();
      break;

    case 'levelClear':
      if (stateTimer > 0) stateTimer--;
      if (stateTimer <= 0 && isJump() && !jumpWasPressed) {
        if (currentLevelIndex >= levelGenerators.length - 1) {
          gameState = 'title';
        } else {
          currentLevelIndex++;
          initLevel(currentLevelIndex);
          gameState = 'livesScreen'; stateTimer = 120;
        }
      }
      jumpWasPressed = isJump();
      break;
  }
}

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.imageSmoothingEnabled = false;

  switch (gameState) {
    case 'title': drawTitle(); break;
    case 'livesScreen': drawLivesScreen(); break;
    case 'gameOver': drawGameOver(); break;
    case 'levelClear': drawLevelClear(); break;
    case 'playing': case 'paused': case 'flagpole': case 'dying':
      // Screen shake
      ctx.save();
      if (screenShake > 0) {
        const shx = (Math.random()-0.5) * screenShake * S;
        const shy = (Math.random()-0.5) * screenShake * S;
        ctx.translate(shx, shy);
        screenShake--;
      }
      drawBackground();
      const startCol = Math.max(0, Math.floor(camera.x/TILE)-1);
      const endCol = Math.min(level.width, startCol+COLS+3);
      for (let y = 0; y < level.height; y++)
        for (let x = startCol; x < endCol; x++) {
          const t = level.grid[y][x];
          if (t !== EMPTY) drawTile(x, y, t);
        }
      drawItems();
      drawEntities();
      drawBossArena();
      drawFireballs();
      drawPlayer();
      drawParticles();
      drawFloatingTexts();
      drawHUD();

      if (gameState === 'paused') {
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        // Pause box
        const bw = 180*S, bh = 100*S;
        const bx = (canvas.width - bw) / 2, by = (canvas.height - bh) / 2;
        ctx.fillStyle = 'rgba(0,0,0,0.8)';
        ctx.fillRect(bx, by, bw, bh);
        ctx.strokeStyle = '#F8D830';
        ctx.lineWidth = 2*S;
        ctx.strokeRect(bx, by, bw, bh);
        ctx.fillStyle = '#F8D830';
        ctx.font = `bold ${14*S}px monospace`;
        ctx.textAlign = 'center';
        ctx.fillText('PAUSED', canvas.width/2, by + 35*S);
        ctx.font = `${7*S}px monospace`;
        ctx.fillStyle = '#FFF';
        ctx.fillText('ESC / P  RESUME', canvas.width/2, by + 60*S);
        ctx.fillStyle = '#AAA';
        ctx.fillText(`WORLD ${level ? level.name : ''}`, canvas.width/2, by + 80*S);
      }
      ctx.restore(); // end screen shake transform
      break;
  }

  // Screen fade overlay
  if (fadeAlpha > 0) {
    ctx.fillStyle = `rgba(0,0,0,${fadeAlpha})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }
  if (fadeDir !== 0) {
    fadeAlpha = Math.max(0, Math.min(1, fadeAlpha + fadeDir * 0.04));
    if (fadeAlpha >= 1) fadeDir = -1;
    if (fadeAlpha <= 0 && fadeDir < 0) fadeDir = 0;
  }
}

requestAnimationFrame(gameLoop);
</script>
</body>
</html>
