function createSpriteCanvas(w, h, drawFn) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const cx = c.getContext('2d');
  cx.imageSmoothingEnabled = false;
  drawFn(cx);
  return c;
}

function px(cx, x, y, color) {
  cx.fillStyle = color;
  cx.fillRect(x, y, 1, 1);
}

// Pre-render all Mario sprites
function buildMarioSprites(colors) {
  const fns_s = [drawSmallMarioStand, drawSmallMarioWalk1, drawSmallMarioWalk2, drawSmallMarioJump, drawSmallMarioSkid];
  const fns_b = [drawBigMarioStand, drawBigMarioWalk1, drawBigMarioWalk2, drawBigMarioJump];
  const small = fns_s.map(fn => {
    const right = createSpriteCanvas(16, 16, cx => fn(cx, colors));
    const left = createSpriteCanvas(16, 16, cx => { cx.translate(16, 0); cx.scale(-1, 1); fn(cx, colors); });
    return { right, left };
  });
  const big = fns_b.map(fn => {
    const right = createSpriteCanvas(16, 32, cx => fn(cx, colors));
    const left = createSpriteCanvas(16, 32, cx => { cx.translate(16, 0); cx.scale(-1, 1); fn(cx, colors); });
    return { right, left };
  });
  return { small, big };
}

function createPipeSprite(type) {
  return createSpriteCanvas(16, 16, cx => {
    const G='#00A800', L='#58D854', D='#005800', N='#003800';
    if (type==='tl') {
      // Pipe top-left: lip section (wider, with highlight)
      cx.fillStyle=D; cx.fillRect(0,0,16,16);
      cx.fillStyle=G; cx.fillRect(1,0,14,16);
      cx.fillStyle=L; cx.fillRect(2,0,5,16);
      cx.fillStyle=D; cx.fillRect(12,0,3,16);
      // Top lip highlight
      cx.fillStyle=L; cx.fillRect(0,0,16,3);
      cx.fillStyle=G; cx.fillRect(1,1,14,1);
      cx.fillStyle=N; cx.fillRect(0,0,1,16); // left edge dark
    } else if (type==='tr') {
      // Pipe top-right: lip section
      cx.fillStyle=D; cx.fillRect(0,0,16,16);
      cx.fillStyle=G; cx.fillRect(1,0,14,16);
      cx.fillStyle=L; cx.fillRect(2,0,5,16);
      cx.fillStyle=D; cx.fillRect(10,0,5,16);
      cx.fillStyle=L; cx.fillRect(0,0,16,3);
      cx.fillStyle=G; cx.fillRect(1,1,14,1);
      cx.fillStyle=N; cx.fillRect(15,0,1,16); // right edge dark
    } else if (type==='bl') {
      // Pipe body-left
      cx.fillStyle=G; cx.fillRect(0,0,16,16);
      cx.fillStyle=D; cx.fillRect(0,0,2,16);
      cx.fillStyle=L; cx.fillRect(2,0,4,16);
      cx.fillStyle=G; cx.fillRect(6,0,4,16);
      cx.fillStyle=D; cx.fillRect(12,0,4,16);
      cx.fillStyle=N; cx.fillRect(0,0,1,16);
    } else {
      // Pipe body-right
      cx.fillStyle=G; cx.fillRect(0,0,16,16);
      cx.fillStyle=L; cx.fillRect(2,0,4,16);
      cx.fillStyle=G; cx.fillRect(6,0,4,16);
      cx.fillStyle=D; cx.fillRect(10,0,5,16);
      cx.fillStyle=N; cx.fillRect(15,0,1,16);
    }
  });
}

const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function ensureAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }

function playTone(freq, duration, type='square', vol=0.06) {
  try {
    ensureAudio();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.value = vol;
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + duration);
  } catch(e) {}
}

function startBGM() {
  if (bgmPlaying) return;
  bgmPlaying = true;
  bgmNoteIndex = 0;
  const melody = level && level.bgType === 'castle' ? BGM_BOSS :
                 level && level.bgType === 'underground' ? BGM_UNDERGROUND : BGM_OVERWORLD;
  const sixteenth = 60000 / BGM_TEMPO / 4;
  let noteTime = 0;
  function scheduleNotes() {
    if (!bgmPlaying) return;
    const note = melody[bgmNoteIndex % melody.length];
    const freq = note[0];
    const dur = note[1] * sixteenth / 1000;
    if (freq > 0) {
      playTone(freq, dur * 0.85, 'square', 0.03);
      // Harmony (octave lower, quieter)
      playTone(freq/2, dur * 0.85, 'triangle', 0.015);
    }
    bgmNoteIndex++;
    noteTime = note[1] * sixteenth;
    bgmInterval = setTimeout(scheduleNotes, noteTime);
  }
  scheduleNotes();
}

function stopBGM() {
  bgmPlaying = false;
  if (bgmInterval) { clearTimeout(bgmInterval); bgmInterval = null; }
}

let starBGMActive = false;
function startStarBGM() {
  stopBGM();
  starBGMActive = true;
  bgmPlaying = true;
  bgmNoteIndex = 0;
  const starMelody = [
    [784,1],[784,1],[784,1],[0,1],[660,1],[784,1],[880,2],
    [784,1],[660,1],[523,1],[0,1],[660,1],[784,1],[880,1],[784,1],
    [660,1],[523,1],[587,1],[0,1],[660,2],[784,1],[880,1],
    [988,2],[880,1],[784,1],[660,2],[523,2],[587,2],[660,2],
  ];
  const sixteenth = 60000 / 200 / 4; // Faster tempo
  function scheduleNotes() {
    if (!bgmPlaying) return;
    const note = starMelody[bgmNoteIndex % starMelody.length];
    if (note[0] > 0) {
      playTone(note[0], note[1] * sixteenth / 1000 * 0.8, 'square', 0.035);
    }
    bgmNoteIndex++;
    bgmInterval = setTimeout(scheduleNotes, note[1] * sixteenth);
  }
  scheduleNotes();
}

// LEVEL DATA — JSON-based level definitions
// ============================================================

// Level builder: converts JSON level data → game level object
function buildLevel(data) {
  const W = data.width, H = 15;
  const grid = Array.from({length: H}, () => new Array(W).fill(EMPTY));
  const qBlocks = [];

  // Ground (rows 13-14, full width minus gaps)
  for (let x = 0; x < W; x++) { grid[13][x] = GROUND; grid[14][x] = GROUND; }
  if (data.groundGaps) {
    for (const [s, e] of data.groundGaps)
      for (let x = s; x <= e; x++) { grid[13][x] = EMPTY; grid[14][x] = EMPTY; }
  }

  // Ceiling (underground levels)
  if (data.ceiling) {
    for (let x = 0; x < W; x++) { grid[0][x] = HARD; grid[1][x] = HARD; }
  }

  // Question blocks: [x, y, itemType]
  if (data.questions) {
    for (const [x, y, item] of data.questions) {
      grid[y][x] = QUESTION;
      qBlocks.push([x, y, item]);
    }
  }

  // Brick blocks: [x, y] or [x, y, item] for bricks containing items
  if (data.bricks) {
    for (const b of data.bricks) {
      grid[b[1]][b[0]] = BRICK;
      if (b[2]) qBlocks.push([b[0], b[1], b[2]]); // hidden item in brick
    }
  }

  // Hard blocks: [x, y] or rows [startX, endX, y]
  if (data.hardBlocks) {
    for (const b of data.hardBlocks) {
      if (b.length === 3) {
        for (let x = b[0]; x <= b[1]; x++) grid[b[2]][x] = HARD;
      } else {
        grid[b[1]][b[0]] = HARD;
      }
    }
  }

  // Platforms: [x, y, width]
  if (data.platforms) {
    for (const [px, py, pw] of data.platforms)
      for (let x = px; x < px + pw; x++) grid[py][x] = PLATFORM;
  }

  // Pipes: [x, height] — sits on ground row 13
  if (data.pipes) {
    for (const [px, ph] of data.pipes) {
      const topRow = 13 - ph;
      for (let h = 0; h < ph; h++) {
        grid[topRow + h][px]     = h === 0 ? PIPE_TL : PIPE_BL;
        grid[topRow + h][px + 1] = h === 0 ? PIPE_TR : PIPE_BR;
      }
    }
  }

  // Stairs: [startX, 'up'|'down', height]
  if (data.stairs) {
    for (const [sx, dir, height] of data.stairs) {
      for (let step = 0; step < height; step++) {
        const col = sx + step;
        const blockCount = dir === 'up' ? step + 1 : height - step;
        for (let b = 0; b < blockCount; b++) {
          grid[12 - b][col] = HARD;
        }
      }
    }
  }

  // Flag pole
  if (data.flagX != null) {
    grid[5][data.flagX] = FLAG_TOP;
    for (let y = 6; y < 13; y++) grid[y][data.flagX] = FLAG_POLE;

    // Small castle after flagpole (3 tiles right of flag)
    const cx = data.flagX + 3;
    if (cx + 4 < W) {
      // Castle body (5 wide x 5 tall)
      for (let cy = 8; cy < 13; cy++)
        for (let bx = cx; bx < cx + 5; bx++)
          grid[cy][bx] = HARD;
      // Tower (3 wide x 3 tall)
      for (let cy = 5; cy < 8; cy++)
        for (let bx = cx + 1; bx < cx + 4; bx++)
          grid[cy][bx] = HARD;
      // Battlement/crenellation top
      grid[4][cx + 1] = HARD;
      grid[4][cx + 3] = HARD;
      // Door (empty space in the bottom center)
      grid[11][cx + 2] = EMPTY;
      grid[12][cx + 2] = EMPTY;
    }
  }

  // Multi-coin bricks (hidden coin blocks that give 5-10 coins)
  if (data.multiCoinBricks) {
    for (const [x, y, count] of data.multiCoinBricks) {
      grid[y][x] = BRICK;
      multiCoinBlocks[x+','+y] = count || 8;
    }
  }

  // Boss arena construction
  if (data.boss) {
    const b = data.boss;
    // Remove ground under bridge + lava area
    for (let x = b.lavaStart; x <= b.lavaEnd; x++) {
      for (let y = b.bridgeRow + 1; y <= 14; y++) grid[y][x] = EMPTY;
    }
    // Also clear bridgeRow itself so only our bridge tiles appear
    for (let x = b.bridgeStart; x <= b.bridgeEnd; x++) {
      grid[b.bridgeRow][x] = EMPTY;
    }

    // Entrance ramp: step down from ground level to bridge level
    // col 80-81: ground to row 12 (step 1)
    for (let x = b.bridgeStart - 5; x < b.bridgeStart - 3; x++) {
      grid[12][x] = HARD;
    }
    // col 82: ground to row 11 (step 2)
    for (let y = 11; y <= 12; y++) grid[y][b.bridgeStart - 3] = HARD;
    // col 83-84: ground at bridge level (row 10+1 = 11 down to 14)
    for (let x = b.bridgeStart - 2; x < b.bridgeStart; x++) {
      for (let y = b.bridgeRow + 1; y <= 14; y++) grid[y][x] = HARD;
    }

    // Platform after axe (safe zone — Princess Toad's room)
    for (let x = b.axeX + 1; x < Math.min(b.axeX + 10, W); x++) {
      grid[11][x] = HARD; grid[12][x] = HARD;
      grid[13][x] = HARD; grid[14][x] = HARD;
    }
    // Back wall
    const backWall = Math.min(b.axeX + 10, W - 1);
    for (let y = 2; y <= 14; y++) grid[y][backWall] = HARD;

    // Ceiling over boss area
    for (let x = b.bridgeStart - 2; x <= backWall; x++) {
      grid[0][x] = HARD; grid[1][x] = HARD;
    }
  }

  // Entity conversion
  const entities = (data.entities || []).map(([type, x, y]) => ({type, x, y}));

  return {
    name: data.name, width: W, height: H, grid, qBlocks,
    playerStart: {x: data.playerStart[0], y: data.playerStart[1]},
    bgColor: data.bgColor, bgType: data.bgType, entities,
    boss: data.boss || null
  };
}

function createPlayer(x, y) {
  return {
    x: x*TILE, y: y*TILE, w: 12, h: 16,
    vx: 0, vy: 0, power: 0, facing: 1,
    onGround: false, coyoteTimer: 0, jumpBufferTimer: 0, jumpHeld: false,
    invincible: 0, starPower: 0, growTimer: 0, shrinkTimer: 0,
    dead: false, fireTimer: 0, animFrame: 0, animTimer: 0, skidding: false,
    stompCombo: 0, crouching: false,
  };
}

function createGoomba(x, y) {
  return {
    type:'goomba', x:x*TILE, y:y*TILE, w:14, h:14,
    vx:-0.5, vy:0, alive:true, squished:false, squishTimer:0,
    flipped:false, flipVy:0, onGround:false, active:false,
    animFrame:0, animTimer:0,
  };
}

function createKoopa(x, y) {
  return {
    type:'koopa', x:x*TILE, y:y*TILE, w:14, h:22,
    vx:-0.5, vy:0, alive:true, state:'walk',
    shellTimer:0, onGround:false, active:false,
    facing:-1, animFrame:0, animTimer:0,
  };
}

function createRedKoopa(x, y) {
  return {
    type:'redkoopa', x:x*TILE, y:y*TILE, w:14, h:22,
    vx:-0.5, vy:0, alive:true, state:'walk',
    shellTimer:0, onGround:false, active:false,

}

function createBuzzy(x, y) {
  return {
    type:'buzzy', x:x*TILE, y:y*TILE, w:14, h:14,
    vx:-0.5, vy:0, alive:true, state:'walk',
    shellTimer:0, onGround:false, active:false,

}

function createParatroopa(x, y) {
  return {
    type:'paratroopa', x:x*TILE, y:y*TILE, w:14, h:22,
    vx:-0.5, vy:0, alive:true, state:'fly',
    shellTimer:0, onGround:false, active:false,
    facing:-1, animFrame:0, animTimer:0,
    baseY: y*TILE, flyTimer:0, wingFrame:0,

}

function createPiranha(pipeX, pipeHeight) {
  // pipeX is the left tile column of the pipe, pipeHeight is its height
  const topRow = 13 - pipeHeight;
  return {
    type:'piranha', x: pipeX*TILE + 1, y: topRow*TILE, w: 14, h: 24,
    vx: 0, vy: 0, alive: true, active: false,
    onGround: true, flipped: false, flipVy: 0,
    animFrame: 0, animTimer: 0,
    // Piranha specific
    baseY: topRow * TILE, hideY: (topRow + 2) * TILE,
    state: 'hidden', stateTimer: 60,
    pipeX: pipeX,
  };
}

function initBossArena() {
  if (!level.boss) return;
  const b = level.boss;

  // Create bridge tiles (row bridgeRow, from bridgeStart to bridgeEnd)
  bridgeTiles = [];
  for (let x = b.bridgeStart; x <= b.bridgeEnd; x++) {
    bridgeTiles.push({tx: x, ty: b.bridgeRow, active: true});
  }

  // Create axe
  axeObj = {

// Boss BGM
const BGM_BOSS = [
  [165,2],[165,2],[165,2],[0,1],[165,1],[196,2],[165,2],[0,2],
  [147,2],[147,2],[147,2],[0,1],[147,1],[175,2],[147,2],[0,2],
  [131,2],[131,2],[131,2],[0,1],[131,1],[165,2],[131,2],[0,2],
  [147,2],[165,2],[196,2],[220,2],[196,2],[165,2],[147,2],[0,2],
];

function updateBowser() {
  if (!bowser || !bowser.alive || bossState !== 'active') return;
  const bw = bowser;

  // Timers
  bw.animTimer++;
  if (bw.animTimer > 12) { bw.animFrame = (bw.animFrame + 1) % 2; bw.animTimer = 0; }
  if (bw.hurtTimer > 0) bw.hurtTimer--;
  if (bw.attackCooldown > 0) bw.attackCooldown--;

  // Face player
  bw.facing = player.x < bw.x ? -1 : 1;

  // State machine
  bw.stateTimer--;

  // Fire attack
  bw.fireTimer--;
  if (bw.fireTimer <= 0 && bw.attackCooldown <= 0) {
    bw.state = 'fire';
    bw.stateTimer = 40;
    bw.attackCooldown = 30;
    bw.fireTimer = 150 + Math.random() * 100;
    // Spawn fireball
    setTimeout(() => {
      if (!bowser || !bowser.alive) return;
      bowserFireballs.push({
        x: bw.x + (bw.facing > 0 ? bw.w : -16),
        y: bw.y + 10,
        vx: bw.facing * 2.5,
        vy: 0, w: 16, h: 8, life: 300, animTimer: 0
      });
      sfxBowserFire();
    }, 300);
  }

  // Hammer attack
  bw.hammerTimer--;
  if (bw.hammerTimer <= 0 && bw.attackCooldown <= 0) {
    bw.attackCooldown = 30;
    bw.hammerTimer = 180 + Math.random() * 120;
    // Spawn 3 hammers in arc
    for (let i = 0; i < 3; i++) {
      setTimeout(() => {
        if (!bowser || !bowser.alive) return;
        bowserHammers.push({
          x: bw.x + bw.w / 2,
          y: bw.y - 4,
          vx: bw.facing * (1.5 + i * 0.5),
          vy: -5 - i * 0.8,
          w: 8, h: 16, life: 200, animTimer: 0
        });
      }, i * 100);
    }
  }

  // Jump
  bw.jumpTimer--;
  if (bw.jumpTimer <= 0 && bw.onGround) {
    bw.vy = -5.5;
    bw.onGround = false;
    bw.jumpTimer = 150 + Math.random() * 150;
  }

  // Walking
  if (bw.state !== 'fire' || bw.stateTimer <= 0) {
    bw.state = 'walk';
    // Walk toward player but patrol bridge area
    const boss = level.boss;
    const leftBound = boss.bridgeStart * TILE;
    const rightBound = boss.bridgeEnd * TILE - bw.w;
    const distToPlayer = player.x - bw.x;

    if (Math.abs(distToPlayer) > 60) {
      bw.vx = bw.facing * 0.6;
    } else {
      bw.vx = bw.facing * 0.3;
    }

    // Stay on bridge
    if (bw.x < leftBound) { bw.x = leftBound; bw.vx = 0.5; }
    if (bw.x > rightBound) { bw.x = rightBound; bw.vx = -0.5; }
  }

  // Physics
  bw.vy += GRAVITY;
  if (bw.vy > MAX_FALL) bw.vy = MAX_FALL;
  bw.x += bw.vx;
  bw.y += bw.vy;

  // Collision with bridge tiles
  bw.onGround = false;
  for (const bt of bridgeTiles) {
    if (!bt.active) continue;
    const btx = bt.tx * TILE, bty = bt.ty * TILE;
    if (bw.x + bw.w > btx && bw.x < btx + TILE &&
        bw.y + bw.h > bty && bw.y + bw.h < bty + TILE + 4 && bw.vy >= 0) {
      bw.y = bty - bw.h;
      bw.vy = 0;
      bw.onGround = true;
    }
  }

  // Also collide with solid tiles
  const footTile = Math.floor((bw.y + bw.h) / TILE);
  const bl = Math.floor((bw.x + 2) / TILE);
  const br = Math.floor((bw.x + bw.w - 2) / TILE);
  for (let tx = bl; tx <= br; tx++) {
    if (isSolid(tx, footTile)) {
      bw.y = footTile * TILE - bw.h;
      bw.vy = 0;
      bw.onGround = true;
    }
  }

  // Fall into lava
  if (bw.y > level.height * TILE) {
    bw.alive = false;
    bossState = 'victory';
    bowserVictoryTimer = 240;
    sfxBowserFall();
    stopBGM();
  }
}

function updateBowserProjectiles() {
  // Fireballs
  for (let i = bowserFireballs.length - 1; i >= 0; i--) {
    const fb = bowserFireballs[i];
    fb.x += fb.vx;
    fb.vy += 0.05; // slight gravity
    fb.y += fb.vy;
    fb.life--;
    fb.animTimer++;
    if (fb.life <= 0 || fb.x < camera.x - 50 || fb.x > camera.x + COLS * TILE + 50 ||
        fb.y > level.height * TILE) {
      bowserFireballs.splice(i, 1);
      continue;
    }
    // Wall collision
    const wtx = Math.floor((fb.x + (fb.vx > 0 ? fb.w : 0)) / TILE);
    const wty = Math.floor((fb.y + 4) / TILE);
    if (isSolid(wtx, wty)) { bowserFireballs.splice(i, 1); continue; }

    // Hit player
    if (!player.dead && player.invincible <= 0 &&
        player.x < fb.x + fb.w && player.x + player.w > fb.x &&
        player.y < fb.y + fb.h && player.y + player.h > fb.y) {
      damagePlayer();
      bowserFireballs.splice(i, 1);
    }
  }

  // Hammers
  for (let i = bowserHammers.length - 1; i >= 0; i--) {
    const h = bowserHammers[i];
    h.x += h.vx;
    h.vy += 0.3;
    h.y += h.vy;
    h.life--;
    h.animTimer++;
    if (h.life <= 0 || h.y > level.height * TILE + 32) {
      bowserHammers.splice(i, 1);
      continue;
    }
    // Hit player
    if (!player.dead && player.invincible <= 0 &&
        player.x < h.x + h.w && player.x + player.w > h.x &&
        player.y < h.y + h.h && player.y + player.h > h.y) {
      damagePlayer();
      bowserHammers.splice(i, 1);
    }
  }
}

function checkFireballHitBowser() {
  if (!bowser || !bowser.alive || bowser.hurtTimer > 0) return;
  for (let i = fireballs.length - 1; i >= 0; i--) {
    const fb = fireballs[i];
    if (fb.x < bowser.x + bowser.w && fb.x + fb.w > bowser.x &&
        fb.y < bowser.y + bowser.h && fb.y + fb.h > bowser.y) {
      bowser.hp--;
      bowser.hurtTimer = 30;
      sfxBowserHurt();
      addFloatingText(bowser.x, bowser.y - 16, String(bowser.hp > 0 ? 'HIT!' : 'DOWN!'), '#FF4500');
      // Fireball explosion
      for (let p = 0; p < 8; p++) {
        addParticle(fb.x, fb.y, (Math.random() - 0.5) * 4, (Math.random() - 0.5) * 4 - 1,
          ['#FF4500', '#FFD700', '#FFF'][p % 3], 20, 3);
      }
      fireballs.splice(i, 1);

      if (bowser.hp <= 0) {
        // Bowser defeated by fireballs — he falls
        bowser.alive = false;
        bowser.vy = -4;
        bossState = 'bowser_falling';
        score += 5000;
        addFloatingText(bowser.x, bowser.y - 32, '5000', '#FFD700');
        stopBGM();
        setTimeout(() => {
          if (bossState === 'bowser_falling') {
            bossState = 'victory';
            bowserVictoryTimer = 240;
            sfxVictoryFanfare();
          }
        }, 1500);
      }
      break;
    }
  }
  // Star power kills Bowser instantly
  if (player.starPower > 0 && bowser.alive &&
      player.x < bowser.x + bowser.w && player.x + player.w > bowser.x &&
      player.y < bowser.y + bowser.h && player.y + player.h > bowser.y) {
    bowser.hp = 0; bowser.alive = false;
    bowser.vy = -4;
    bossState = 'bowser_falling';
    score += 5000;
    addFloatingText(bowser.x, bowser.y - 32, '5000', '#FFD700');
    sfxStomp(); stopBGM();
    setTimeout(() => {
      if (bossState === 'bowser_falling') {
        bossState = 'victory';
        bowserVictoryTimer = 240;
        sfxVictoryFanfare();
      }
    }, 1500);
  }
}

function checkAxeCollision() {
  if (!axeObj || !axeObj.active) return;
  if (player.x < axeObj.x + axeObj.w && player.x + player.w > axeObj.x &&
      player.y < axeObj.y + axeObj.h && player.y + player.h > axeObj.y) {
    // Axe touched! Start bridge collapse
    axeObj.active = false;
    bossState = 'bridge_collapse';
    bridgeCollapseTimer = 0;
    bridgeCollapseIndex = bridgeTiles.length - 1;
    player.vx = 0;
    player.invincible = 600; // invincible during collapse
    stopBGM();
    sfxBridgeCollapse();
  }
}

function updateBridgeCollapse() {
  if (bossState !== 'bridge_collapse') return;
  bridgeCollapseTimer++;

  // Remove one bridge tile every 3 frames (from axe side to bowser side)
  if (bridgeCollapseTimer % 3 === 0 && bridgeCollapseIndex >= 0) {
    const bt = bridgeTiles[bridgeCollapseIndex];
    bt.active = false;
    // Add falling particle
    addParticle(bt.tx * TILE + 8, bt.ty * TILE + 8, (Math.random() - 0.5) * 2, 1,
      '#886644', 40, 6);
    addParticle(bt.tx * TILE + 4, bt.ty * TILE + 4, (Math.random() - 0.5) * 2, 0.5,
      '#A07840', 35, 4);
    sfxBridgeCollapse();
    bridgeCollapseIndex--;
  }

  // Bowser falls when no bridge under him
  if (bowser && bowser.alive) {
    let hasSupport = false;
    for (const bt of bridgeTiles) {
      if (!bt.active) continue;
      const btx = bt.tx * TILE;
      if (bowser.x + bowser.w > btx && bowser.x < btx + TILE) {
        hasSupport = true; break;
      }
    }
    if (!hasSupport) {
      bowser.onGround = false;
      bowser.vy += GRAVITY;
      bowser.y += bowser.vy;
      if (bowser.y > level.height * TILE + 32) {
        bowser.alive = false;
        sfxBowserFall();
      }
    }
  }

  // All tiles removed
  if (bridgeCollapseIndex < 0 && (!bowser || !bowser.alive || bowser.y > level.height * TILE)) {
    bossState = 'victory';
    bowserVictoryTimer = 240;
    score += 5000;
    addFloatingText(player.x, player.y - 32, '5000', '#FFD700');
    sfxVictoryFanfare();
  }
}

function updateBossVictory() {
  if (bossState !== 'victory') return;
  bowserVictoryTimer--;
  if (bowserVictoryTimer <= 0) {
    gameState = 'levelClear';
    stateTimer = 180;
    sfxLevelClear();
  }
}

function checkPlayerBowserCollision() {
  if (!bowser || !bowser.alive || player.dead || player.invincible > 0 || bossState !== 'active') return;
  if (player.x < bowser.x + bowser.w && player.x + player.w > bowser.x &&
      player.y < bowser.y + bowser.h && player.y + player.h > bowser.y) {
    if (player.starPower > 0) return; // handled in checkFireballHitBowser
    damagePlayer();
  }
}

// ============================================================
// COLLISION
// ============================================================
function isSolid(tx, ty) {
  if (tx < 0 || tx >= level.width || ty >= level.height) return true;
  if (ty < 0) return false;
  const t = level.grid[ty][tx];
  return t===GROUND||t===BRICK||t===QUESTION||t===USED||t===HARD||
         t===PIPE_TL||t===PIPE_TR||t===PIPE_BL||t===PIPE_BR;
}

function isPlatform(tx, ty) {
  if (tx<0||tx>=level.width||ty<0||ty>=level.height) return false;
  return level.grid[ty][tx] === PLATFORM;
}

function tileAt(tx, ty) {
  if (tx<0||tx>=level.width||ty<0||ty>=level.height) return EMPTY;
  return level.grid[ty][tx];
}

function getQBlockItem(tx, ty) {
  if (!level.qBlocks) return 'coin';
  const f = level.qBlocks.find(q => q[0]===tx && q[1]===ty);
  return f ? f[2] : 'coin';
}

// Push entity out of any solid tiles it overlaps with
function resolveOverlap(ent) {
  for (let iter = 0; iter < 4; iter++) {
    let resolved = true;
    const l = Math.floor(ent.x / TILE);
    const r = Math.floor((ent.x + ent.w - 0.5) / TILE);
    const t = Math.floor(ent.y / TILE);
    const b = Math.floor((ent.y + ent.h - 0.5) / TILE);
    for (let ty = t; ty <= b; ty++) {
      for (let tx = l; tx <= r; tx++) {
        if (!isSolid(tx, ty)) continue;
        // Calculate overlaps on each side
        const overlapL = (ent.x + ent.w) - tx * TILE;
        const overlapR = (tx + 1) * TILE - ent.x;
        const overlapT = (ent.y + ent.h) - ty * TILE;
        const overlapB = (ty + 1) * TILE - ent.y;
        const min = Math.min(overlapL, overlapR, overlapT, overlapB);
        if (min === overlapT) { ent.y = ty * TILE - ent.h; ent.vy = Math.min(ent.vy, 0); ent.onGround = true; }
        else if (min === overlapB) { ent.y = (ty + 1) * TILE; ent.vy = Math.max(ent.vy, 0); }
        else if (min === overlapL) { ent.x = tx * TILE - ent.w; }
        else { ent.x = (tx + 1) * TILE; }
        resolved = false;
      }
    }
    if (resolved) break;
  }
}

// Collision resolution - separate X and Y properly
function moveAndCollideX(ent) {
  ent.x += ent.vx;
  const top = Math.floor((ent.y + 1) / TILE);
  const bottom = Math.floor((ent.y + ent.h - 1) / TILE);

  for (let ty = top; ty <= bottom; ty++) {
    if (ent.vx > 0) {
      const right = Math.floor((ent.x + ent.w + 0.01) / TILE);
      if (isSolid(right, ty)) {
        ent.x = right * TILE - ent.w;
        ent.vx = 0;
        return true;
      }
    } else if (ent.vx < 0) {
      const left = Math.floor((ent.x - 0.01) / TILE);
      if (isSolid(left, ty)) {
        ent.x = (left + 1) * TILE;
        ent.vx = 0;
        return true;
      }
    }
  }
  return false;
}

function moveAndCollideY(ent, isPlayer) {
  const prevY = ent.y;
  ent.y += ent.vy;

  const left = Math.floor((ent.x + 1) / TILE);
  const right = Math.floor((ent.x + ent.w - 1) / TILE);

  ent.onGround = false;

  if (ent.vy >= 0) {
    // Falling or stationary - check ground below feet
    const footTile = Math.floor((ent.y + ent.h) / TILE);
    const prevFoot = Math.floor((prevY + ent.h) / TILE);
    for (let tx = left; tx <= right; tx++) {
      // Solid ground
      if (isSolid(tx, footTile)) {
        ent.y = footTile * TILE - ent.h;
        ent.vy = 0;
        ent.onGround = true;
      }
      // One-way platform - only if coming from above
      if (!ent.onGround && isPlatform(tx, footTile)) {
        const platTop = footTile * TILE;
        if (prevY + ent.h <= platTop + 2) {
          ent.y = platTop - ent.h;
          ent.vy = 0;
          ent.onGround = true;
        }
      }
    }
    // Bridge tile collision (boss arena)
    if (!ent.onGround && isPlayer && bridgeTiles.length > 0) {
      for (const bt of bridgeTiles) {
        if (!bt.active) continue;
        const btTop = bt.ty * TILE;
        const btLeft = bt.tx * TILE;
        if (ent.x + ent.w > btLeft && ent.x < btLeft + TILE &&
            ent.y + ent.h >= btTop && prevY + ent.h <= btTop + 3 && ent.vy >= 0) {
          ent.y = btTop - ent.h;
          ent.vy = 0;
          ent.onGround = true;
          break;
        }
      }
    }
  }

  if (ent.vy < 0) {
    // Rising - check head
    const headTile = Math.floor(ent.y / TILE);
    for (let tx = left; tx <= right; tx++) {
      if (isSolid(tx, headTile)) {
        ent.y = (headTile + 1) * TILE;
        ent.vy = 0;
        if (isPlayer) hitBlockBelow(tx, headTile);
      }
    }
  }
}

// ============================================================
// PARTICLES / EFFECTS
// ============================================================
function addParticle(x, y, vx, vy, color, life=30, size=4) {
  particles.push({x,y,vx,vy,color,life,maxLife:life,size});
}
function addFloatingText(x, y, text, color='#fff') {
  floatingTexts.push({x,y,text,color,life:50,vy:-1.2});
}
function addBrickParticles(x, y) {
  const c = ['#C84C0C','#E09050','#A03808','#6B2800'];
  for (let i = 0; i < 4; i++) {
    addParticle(x+(i%2)*8, y+Math.floor(i/2)*8,
      (i%2===0?-1.5:1.5)*(1+Math.random()), -4-Math.random()*3, c[i], 45, 6);
  }
}

// ============================================================
// ITEMS
// ============================================================
function spawnItem(tx, ty, type) {
  const px = tx*TILE, py = ty*TILE;
  if (type === 'coin') {
    sfxCoin(); score += 200; coins++; coinFlashTimer = 15;
    if (coins >= 100) { coins -= 100; lives++; sfx1up(); addFloatingText(px, py-32, '1UP', '#00FF00'); }
    addFloatingText(px, py-16, '200', '#FFD700');
    // Spinning coin animation
    particles.push({x:px+4, y:py-8, vx:0, vy:-7, color:'coin', life:30, maxLife:30, size:0});
  } else if (type === 'mushroom') {
    if (player.power >= 1) {
      items.push({type:'fireflower',x:px,y:py,targetY:py-TILE,rising:true,vx:0,vy:0,animTimer:0});
    } else {
      items.push({type:'mushroom',x:px,y:py,targetY:py-TILE,rising:true,vx:1.5,vy:0});
    }
    sfxPowerup();
  } else if (type === 'star') {
    items.push({type:'star',x:px,y:py,targetY:py-TILE,rising:true,vx:2.0,vy:-6.0,animTimer:0});
    sfxPowerup();
  }
}

function hitBlockBelow(tx, ty) {
  const tile = tileAt(tx, ty);
  if (tile === QUESTION) {
    level.grid[ty][tx] = USED;
    const item = getQBlockItem(tx, ty);
    spawnItem(tx, ty, item);
    bumpEntitiesOnTile(tx, ty);
    bumpedBlocks.push({tx, ty, offsetY: 0, timer: 0, maxTimer: 12});
  } else if (tile === BRICK) {
    const key = tx+','+ty;
    // Check if this brick has a hidden item (not the default coin fallback)
    const brickItemQ = level.qBlocks ? level.qBlocks.find(q => q[0]===tx && q[1]===ty) : null;
    const brickItem = brickItemQ ? brickItemQ[2] : null;
    if (multiCoinBlocks[key] > 0) {
      // Multi-coin brick
      multiCoinBlocks[key]--;
      spawnItem(tx, ty, 'coin');
      bumpedBlocks.push({tx, ty, offsetY: 0, timer: 0, maxTimer: 12});
      bumpEntitiesOnTile(tx, ty);
      if (multiCoinBlocks[key] <= 0) level.grid[ty][tx] = USED;
    } else if (brickItem) {
      // Brick contains a hidden item (like star)
      level.grid[ty][tx] = USED;
      spawnItem(tx, ty, brickItem);
      bumpedBlocks.push({tx, ty, offsetY: 0, timer: 0, maxTimer: 12});
      bumpEntitiesOnTile(tx, ty);
    } else if (player.power > 0) {
      level.grid[ty][tx] = EMPTY;
      sfxBreak(); score += 50;
      addBrickParticles(tx*TILE, ty*TILE);
      screenShake = 4;
      bumpEntitiesOnTile(tx, ty);
    } else {
      sfxBump();
      bumpEntitiesOnTile(tx, ty);
      bumpedBlocks.push({tx, ty, offsetY: 0, timer: 0, maxTimer: 12});
    }
  } else if (tile === USED || tile === HARD) {
    sfxBump();
    bumpedBlocks.push({tx, ty, offsetY: 0, timer: 0, maxTimer: 12});
  }
}

function bumpEntitiesOnTile(tx, ty) {
  for (const e of entities) {
    if (!e.alive || e.flipped) continue;
    const etx = Math.floor((e.x + e.w/2) / TILE);
    const ety = Math.floor((e.y + e.h) / TILE);
    if (etx === tx && ety === ty) {
      e.alive = false; e.flipped = true; e.flipVy = -5;
      score += 100; addFloatingText(e.x, e.y-8, '100');
    }
  }
}

// ============================================================
// INIT LEVEL
// ============================================================
function initLevel(idx) {
  currentLevelIndex = idx;
  multiCoinBlocks = {};
  level = levelGenerators[idx]();
  player = createPlayer(level.playerStart.x, level.playerStart.y);
  camera.x = 0;
  entities = []; particles = []; fireballs = []; floatingTexts = []; items = [];
  bumpedBlocks = [];
  levelTime = 400; timeTimer = 0;
  for (const e of level.entities) {
    if (e.type==='goomba') entities.push(createGoomba(e.x, e.y));
    else if (e.type==='koopa') entities.push(createKoopa(e.x, e.y));
    else if (e.type==='redkoopa') entities.push(createRedKoopa(e.x, e.y));
    else if (e.type==='buzzy') entities.push(createBuzzy(e.x, e.y));
    else if (e.type==='paratroopa') entities.push(createParatroopa(e.x, e.y));
  }
  // Spawn Piranha Plants in pipes
  if (level.pipes) {
    // pipes data is already consumed by buildLevel, but we can read from level data
  }
  // Use the LEVELS_JSON data pipes to add piranhas
  const levelData = LEVELS_JSON[idx];
  if (levelData && levelData.pipes && levelData.piranhas !== false) {
    for (const [px, ph] of levelData.pipes) {
      // Skip first pipe in level 1 (too close to start)
      if (px < 10) continue;
      const p = createPiranha(px, ph);
      p.active = true; // piranhas are always active
      entities.push(p);
    }
  }

  // Initialize boss arena if this level has a boss
  bowser = null;
  bowserFireballs = [];
  bowserHammers = [];
  bridgeTiles = [];
  axeObj = null;
  bossState = 'none';
  if (level.boss) {
    initBossArena();
  }
}

// ============================================================
// PLAYER UPDATE
// ============================================================
function updatePlayer() {
  if (player.dead) return;
  if (player.growTimer > 0) { player.growTimer--; return; }
  if (player.shrinkTimer > 0) {
    player.shrinkTimer--;
    if (player.shrinkTimer === 0 && player.power === 0) player.h = 16;
    return;
  }

  const p = player;

  // Crouching (big Mario only)
  if (p.h > 16 && isDown() && p.onGround) {
    p.crouching = true;
    // Decelerate while crouching
    if (Math.abs(p.vx) < DECEL) p.vx = 0;
    else p.vx -= Math.sign(p.vx) * DECEL;
  } else {
    p.crouching = false;
  }

  const running = isRun();
  const maxSpd = running ? RUN_MAX : WALK_MAX;
  const accel = running ? RUN_ACCEL : WALK_ACCEL;

  // Horizontal (no movement while crouching)
  if (p.crouching) {
    // Already decelerating above
  } else if (isLeft()) {
    p.facing = -1;
    if (p.vx > 0.1) { p.vx -= SKID_DECEL; p.skidding = true; }
    else { p.vx = Math.max(p.vx - accel, -maxSpd); p.skidding = false; }
  } else if (isRight()) {
    p.facing = 1;
    if (p.vx < -0.1) { p.vx += SKID_DECEL; p.skidding = true; }
    else { p.vx = Math.min(p.vx + accel, maxSpd); p.skidding = false; }
  } else {
    p.skidding = false;
    if (Math.abs(p.vx) < DECEL) p.vx = 0;
    else p.vx -= Math.sign(p.vx) * DECEL;
  }

  // Speed clamp when not running
  if (!running && Math.abs(p.vx) > WALK_MAX) {
    p.vx -= Math.sign(p.vx) * DECEL * 0.5;
  }

  // Animation
  if (p.onGround && Math.abs(p.vx) > 0.1) {
    p.animTimer++;
    const threshold = Math.max(3, 8 - Math.abs(p.vx) * 2.5);
    if (p.animTimer > threshold) { p.animFrame = (p.animFrame + 1) % 3; p.animTimer = 0; }
  } else if (!p.onGround) {
    p.animFrame = 0;
  } else {
    p.animFrame = 0; p.animTimer = 0;
  }

  // Skid particles
  if (p.skidding && p.onGround && globalTimer % 3 === 0) {
    addParticle(p.x + (p.facing > 0 ? 0 : p.w), p.y + p.h - 2,
      p.facing * 0.5, -1.5, '#C8A060', 10, 2);
  }

  // Landing dust particles
  if (p.onGround && !p.wasOnGround && p.vy >= 0) {
    for (let i = 0; i < 3; i++) {
      addParticle(p.x + p.w/2 + (Math.random()-0.5)*8, p.y + p.h,
        (Math.random()-0.5)*2, -0.5-Math.random(), '#C8A060', 12, 2);
    }
  }
  p.wasOnGround = p.onGround;

  // Coyote time - set BEFORE jump check
  if (p.onGround) { p.coyoteTimer = COYOTE_TIME; p.stompCombo = 0; }
  else if (p.coyoteTimer > 0) p.coyoteTimer--;

  // Jump input
  jumpPressed = isJump();
  if (jumpPressed && !jumpWasPressed) {
    p.jumpBufferTimer = JUMP_BUFFER;
  }
  jumpWasPressed = jumpPressed;
  if (p.jumpBufferTimer > 0) p.jumpBufferTimer--;

  if (p.jumpBufferTimer > 0 && (p.onGround || p.coyoteTimer > 0)) {
    let jv = JUMP_VEL;
    if (Math.abs(p.vx) > WALK_MAX) jv += RUN_JUMP_BONUS;
    p.vy = jv;
    p.onGround = false;
    p.coyoteTimer = 0;
    p.jumpBufferTimer = 0;
    p.jumpHeld = true;
    sfxJump();
  }
  if (!jumpPressed) p.jumpHeld = false;

  // Gravity - variable jump height
  if (p.vy < 0 && jumpPressed && p.jumpHeld) {
    p.vy += GRAVITY_HOLD;
  } else {
    p.vy += GRAVITY_RELEASE;
  }
  if (p.vy > MAX_FALL) p.vy = MAX_FALL;

  // Move
  moveAndCollideX(p);
  moveAndCollideY(p, true);

  // Camera - smooth follow both directions
  const targetCam = p.x - (COLS * TILE) / 2 + 32;
  const camDiff = targetCam - camera.x;
  if (Math.abs(camDiff) > 0.5) {
    camera.x += camDiff * 0.12;
  } else {
    camera.x = targetCam;
  }
  camera.x = Math.max(0, Math.min(camera.x, (level.width - COLS) * TILE));

  // Don't go past level left edge
  if (p.x < 2) p.x = 2;

  // Pit death
  if (p.y > level.height * TILE + 16) killPlayer();

  // Timers
  if (p.invincible > 0) p.invincible--;
  if (p.starPower > 0) {
    p.starPower--;
    // Flash warning when star about to expire
    if (p.starPower === 120) sfxTimeWarning();
    if (p.starPower === 0 && starBGMActive) {
      starBGMActive = false; stopBGM(); startBGM();
    }
  }
  if (p.fireTimer > 0) p.fireTimer--;

  // Level timer (no time limit in boss fight)
  if (bossState !== 'none') { levelTime = 999; }
  timeTimer++;
  // Level timer - speeds up below 100
  const timeSpeed = levelTime <= 100 ? 45 : 60; // faster countdown when hurry
  if (timeTimer >= timeSpeed) {
    timeTimer = 0; levelTime--;
    if (levelTime <= 0) killPlayer();
    if (levelTime === 100) { sfxTimeWarning(); addFloatingText(player.x, player.y-32, 'HURRY!', '#FF4444'); }
    if (levelTime <= 100 && levelTime > 0 && levelTime % 25 === 0) sfxTimeWarning();
  }
}

// ============================================================
// FIREBALL
// ============================================================
function handleFireball() {
  firePressed = isRun();
  if (player.power === 2 && firePressed && !fireWasPressed && player.fireTimer <= 0 && fireballs.length < FIREBALL_MAX && !player.dead) {
    fireballs.push({
      x: player.x + (player.facing > 0 ? player.w : -8),
      y: player.y + (player.h > 16 ? 10 : 4),
      vx: FIREBALL_SPEED * player.facing,
      vy: 0, w: 8, h: 8, life: 300, animTimer: 0,
    });
    player.fireTimer = FIREBALL_COOLDOWN;
    sfxFireball();
  }
  fireWasPressed = firePressed;
}

function updateFireballs() {
  for (let i = fireballs.length - 1; i >= 0; i--) {
    const fb = fireballs[i];
    fb.vy += FIREBALL_GRAVITY;
    fb.x += fb.vx;
    fb.y += fb.vy;
    fb.life--; fb.animTimer++;

    // Ground bounce
    const footTile = Math.floor((fb.y + fb.h) / TILE);
    const btx = Math.floor((fb.x + 4) / TILE);
    if (footTile >= 0 && footTile < level.height && isSolid(btx, footTile)) {
      fb.y = footTile * TILE - fb.h;
      fb.vy = FIREBALL_BOUNCE;
    }

    // Wall collision
    const wtx = Math.floor((fb.x + (fb.vx > 0 ? fb.w : 0)) / TILE);
    const wty = Math.floor((fb.y + 4) / TILE);
    if (isSolid(wtx, wty)) {
      addParticle(fb.x, fb.y, 0, -1, '#FF4500', 12);
      fireballs.splice(i, 1); continue;
    }

    if (fb.life <= 0 || fb.y > level.height * TILE) { fireballs.splice(i, 1); continue; }

    // Hit enemies
    let hit = false;
    for (const e of entities) {
      if (!e.alive || e.flipped) continue;
      if ((e.type === 'koopa' || e.type === 'redkoopa') && (e.state === 'shell' || e.state === 'shellMoving')) continue;
      if (e.type === 'buzzy') {
        // Buzzy Beetle is fireproof! Show bounce effect
        if (fb.x < e.x+e.w && fb.x+fb.w > e.x && fb.y < e.y+e.h && fb.y+fb.h > e.y) {
          addParticle(fb.x, fb.y, 0, -1, '#FF4500', 12);
          sfxBump(); hit = true; break;
        }
        continue;
      }
      if (e.type === 'piranha' && e.state === 'hidden') continue;
      if (fb.x < e.x+e.w && fb.x+fb.w > e.x && fb.y < e.y+e.h && fb.y+fb.h > e.y) {
        // Paratroopa: fireball removes wings, becomes ground koopa
        if (e.type === 'paratroopa') {
          e.type = 'koopa'; e.state = 'walk'; e.vx = -0.5;
          e.vy = 0; e.facing = -1;
          score += 100; addFloatingText(e.x, e.y-8, '100');
          for (let p = 0; p < 4; p++) {
            addParticle(e.x+e.w/2, e.y+4,
              (Math.random()-0.5)*3, -2-Math.random()*2,
              '#F8F8F8', 20, 2);
          }
          sfxStomp(); hit = true; break;
        }
        e.alive = false; e.flipped = true; e.flipVy = -5;
        score += 100; addFloatingText(e.x, e.y-8, '100');
        // Fireball hit explosion
        for (let p = 0; p < 6; p++) {
          addParticle(e.x+e.w/2, e.y+e.h/2,
            (Math.random()-0.5)*3, (Math.random()-0.5)*3-1,
            ['#FF4500','#FFD700','#FFF'][p%3], 15, 3);
        }
        sfxStomp(); hit = true; break;
      }
    }
    if (hit) { fireballs.splice(i, 1); }
  }
}

// ============================================================
// ENEMIES
// ============================================================
function updateEntities() {
  const activateRange = camera.x + COLS * TILE + 48;

  for (const e of entities) {
    if (!e.active) {
      if (e.x < activateRange && e.x > camera.x - 32) e.active = true;
      else continue;
    }

    // Flipped (dying) animation
    if (e.flipped) {
      e.flipVy += GRAVITY;
      e.y += e.flipVy;
      if (e.y > level.height * TILE + 64) e.active = false;
      continue;
    }

    // Squished goomba timer
    if (!e.alive) {
      if (e.squished) { e.squishTimer--; if (e.squishTimer <= 0) e.active = false; }
      continue;
    }

    // Koopa/RedKoopa/Buzzy shell idle
    if ((e.type === 'koopa' || e.type === 'redkoopa' || e.type === 'buzzy') && e.state === 'shell') {
      // Apply gravity even in shell state
      e.vy += GRAVITY;
      if (e.vy > MAX_FALL) e.vy = MAX_FALL;
      e.y += e.vy;
      // Ground collision - use same logic as player
      const footTile = Math.floor((e.y + e.h) / TILE);
      const bl = Math.floor((e.x + 1) / TILE);
      const br = Math.floor((e.x + e.w - 1) / TILE);
      for (let tx = bl; tx <= br; tx++) {
        if (isSolid(tx, footTile)) { e.y = footTile * TILE - e.h; e.vy = 0; e.onGround = true; }
      }

      e.shellTimer--;
      if (e.shellTimer <= 0) {
        e.state = 'walk';
        const oldBottom = e.y + e.h;
        e.h = e.type === 'buzzy' ? 14 : 22;
        e.y = oldBottom - e.h;
        e.vx = player.x > e.x ? 0.5 : -0.5;
        e.facing = e.vx > 0 ? 1 : -1;
      }
      continue;
    }

    // Paratroopa flying behavior
    if (e.type === 'paratroopa' && e.state === 'fly') {
      e.flyTimer++;
      e.wingFrame = Math.floor(e.flyTimer / 4) % 2;
      // Bounce up and down
      e.y = e.baseY + Math.sin(e.flyTimer * 0.04) * 24;
      // Slowly move horizontally
      e.x += e.vx;
      // Wall collision
      const et2 = Math.floor((e.y + 1) / TILE);
      const eb2 = Math.floor((e.y + e.h - 1) / TILE);
      for (let ty = et2; ty <= eb2; ty++) {
        if (e.vx > 0) {
          const er = Math.floor((e.x + e.w) / TILE);
          if (isSolid(er, ty)) { e.vx = -Math.abs(e.vx); e.facing = -1; }
        }
        if (e.vx < 0) {
          const el = Math.floor((e.x - 0.01) / TILE);
          if (isSolid(el, ty)) { e.vx = Math.abs(e.vx); e.facing = 1; }
        }
      }
      // Animation
      e.animTimer++;
      if (e.animTimer > 10) { e.animFrame = (e.animFrame+1) % 2; e.animTimer = 0; }
      // Remove if off screen
      if (e.x < camera.x - 80 || e.y > level.height * TILE + 64) e.active = false;
      continue;
    }

    // Physics
    e.vy += GRAVITY;
    if (e.vy > MAX_FALL) e.vy = MAX_FALL;

    // Move X
    e.x += e.vx;
    const et = Math.floor((e.y + 1) / TILE);
    const eb = Math.floor((e.y + e.h - 1) / TILE);
    for (let ty = et; ty <= eb; ty++) {
      if (e.vx > 0) {
        const er = Math.floor((e.x + e.w) / TILE);
        if (isSolid(er, ty)) { e.vx = -Math.abs(e.vx); e.facing = -1; e.x = er * TILE - e.w; }
      }
      if (e.vx < 0) {
        const el = Math.floor((e.x - 0.01) / TILE);
        if (isSolid(el, ty)) { e.vx = Math.abs(e.vx); e.facing = 1; e.x = (el+1) * TILE; }
      }
    }

    // Move Y
    const prevEY = e.y;
    e.y += e.vy;
    e.onGround = false;
    const bl2 = Math.floor((e.x + 1) / TILE);
    const br2 = Math.floor((e.x + e.w - 1) / TILE);

    if (e.vy >= 0) {
      const footTile = Math.floor((e.y + e.h) / TILE);
      for (let tx = bl2; tx <= br2; tx++) {
        if (isSolid(tx, footTile)) { e.y = footTile * TILE - e.h; e.vy = 0; e.onGround = true; }
        if (!e.onGround && isPlatform(tx, footTile) && prevEY + e.h <= footTile * TILE + 2) {
          e.y = footTile * TILE - e.h; e.vy = 0; e.onGround = true;
        }
      }
    }
    if (e.vy < 0) {
      const headTile = Math.floor(e.y / TILE);
      for (let tx = bl2; tx <= br2; tx++) {
        if (isSolid(tx, headTile)) { e.y = (headTile+1) * TILE; e.vy = 0; }
      }
    }

    // Edge detection: Red Koopa and Buzzy turn at ledges, Green Koopa walks off (NES-faithful)
    if ((e.type === 'redkoopa' || e.type === 'buzzy') && e.state === 'walk' && e.onGround) {
      const frontX = e.vx > 0 ? Math.floor((e.x + e.w + 1) / TILE) : Math.floor((e.x - 1) / TILE);
      const belowFoot = Math.floor((e.y + e.h + 1) / TILE);
      if (!isSolid(frontX, belowFoot) && !isPlatform(frontX, belowFoot)) {
        e.vx = -e.vx;
        e.facing = e.vx > 0 ? 1 : -1;
      }
    }

    // Piranha Plant AI
    if (e.type === 'piranha') {
      e.animTimer++;
      if (e.animTimer > 12) { e.animFrame = (e.animFrame+1)%2; e.animTimer = 0; }

      e.stateTimer--;
      if (e.state === 'hidden') {
        e.y = e.hideY;
        if (e.stateTimer <= 0) {
          // Don't emerge if player is near the pipe
          const playerDist = Math.abs((player.x + player.w/2) - (e.pipeX * TILE + TILE));
          if (playerDist > TILE * 2) {
            e.state = 'rising'; e.stateTimer = 30;
          } else {
            e.stateTimer = 30;
          }
        }
      } else if (e.state === 'rising') {
        e.y = e.hideY - ((30 - e.stateTimer) / 30) * (e.hideY - e.baseY + 8);
        if (e.stateTimer <= 0) { e.state = 'out'; e.stateTimer = 60; e.y = e.baseY - 8; }
      } else if (e.state === 'out') {
        if (e.stateTimer <= 0) { e.state = 'sinking'; e.stateTimer = 30; }
      } else if (e.state === 'sinking') {
        e.y = e.baseY - 8 + ((30 - e.stateTimer) / 30) * (e.hideY - e.baseY + 8);
        if (e.stateTimer <= 0) { e.state = 'hidden'; e.stateTimer = 60 + Math.random()*60; }
      }
      continue;
    }

    // Shell moving hitting enemies
    if ((e.type === 'koopa' || e.type === 'redkoopa' || e.type === 'buzzy') && e.state === 'shellMoving') {
      for (const other of entities) {
        if (other === e || !other.alive || other.flipped) continue;
        if (e.x < other.x+other.w && e.x+e.w > other.x && e.y < other.y+other.h && e.y+e.h > other.y) {
          other.alive = false; other.flipped = true; other.flipVy = -5;
          score += 100; addFloatingText(other.x, other.y-8, '100');
          sfxKick();
        }
      }
    }

    // Remove if off screen
    if (e.x < camera.x - 80 || e.y > level.height * TILE + 64) e.active = false;

    // Animation
    e.animTimer++;
    if (e.animTimer > 10) { e.animFrame = (e.animFrame+1) % 2; e.animTimer = 0; }
  }
}

// ============================================================
// PLAYER-ENEMY COLLISION
// ============================================================
function checkPlayerEnemyCollision() {
  if (player.dead || player.growTimer > 0 || player.shrinkTimer > 0) return;

  for (const e of entities) {
    if (!e.alive || !e.active || e.flipped) continue;

    // AABB check
    if (!(player.x < e.x+e.w && player.x+player.w > e.x && player.y < e.y+e.h && player.y+player.h > e.y)) {
      // Shell kick check (idle shell)
      if ((e.type === 'koopa' || e.type === 'redkoopa' || e.type === 'buzzy') && e.state === 'shell') {
        if (player.x < e.x+e.w+2 && player.x+player.w > e.x-2 && player.y < e.y+e.h && player.y+player.h > e.y) {
          e.state = 'shellMoving';
          e.vx = (player.x + player.w/2) < (e.x + e.w/2) ? SHELL_SPEED : -SHELL_SPEED;
          e.facing = e.vx > 0 ? 1 : -1;
          sfxKick(); player.invincible = 12;
          score += 100; addFloatingText(e.x, e.y-8, '100');
        }
      }
      continue;
    }

    // Shell idle - kick it
    if ((e.type === 'koopa' || e.type === 'redkoopa' || e.type === 'buzzy') && e.state === 'shell') {
      e.state = 'shellMoving';
      e.vx = (player.x + player.w/2) < (e.x + e.w/2) ? SHELL_SPEED : -SHELL_SPEED;
      e.facing = e.vx > 0 ? 1 : -1;
      sfxKick(); player.invincible = 12;
      score += 100; addFloatingText(e.x, e.y-8, '100');
      continue;
    }

    // Star power
    if (player.starPower > 0) {
      e.alive = false; e.flipped = true; e.flipVy = -5;
      score += 100; addFloatingText(e.x, e.y-8, '100');
      sfxStomp(); continue;
    }

    // Piranha Plant - can't be stomped, only killed by fireball/star
    if (e.type === 'piranha') {
      if (e.state === 'hidden') continue; // don't collide when hidden
      damagePlayer(); continue;
    }

    // Invincibility frames
    if (player.invincible > 0) continue;

    // Stomp check - player must be falling and above enemy center
    const playerBottom = player.y + player.h;
    const enemyMidY = e.y + e.h * 0.4;

    if (player.vy > 0 && playerBottom < enemyMidY + 6) {
      player.vy = isJump() ? JUMP_VEL * 0.7 : JUMP_VEL * 0.5;
      // Stomp combo: 100, 200, 400, 800, 1000, 2000, 4000, 8000, 1UP
      const comboScores = [100,200,400,800,1000,2000,4000,8000];
      const ci = Math.min(player.stompCombo, comboScores.length - 1);
      const pts = comboScores[ci];
      player.stompCombo++;
      if (player.stompCombo > comboScores.length) {
        lives++; sfx1up(); addFloatingText(e.x, e.y-8, '1UP', '#00FF00');
      } else {
        score += pts; addFloatingText(e.x, e.y-8, String(pts));
      }
      sfxStomp();

      if (e.type === 'goomba') {
        e.alive = false; e.squished = true; e.squishTimer = 30;
        e.h = 8; e.y += 6;
      } else if (e.type === 'koopa' || e.type === 'redkoopa') {
        if (e.state === 'walk') {
          e.state = 'shell'; e.vx = 0; e.h = 16; e.shellTimer = 300;
        } else if (e.state === 'shellMoving') {
          e.state = 'shell'; e.vx = 0; e.shellTimer = 300;
        }
      } else if (e.type === 'buzzy') {
        if (e.state === 'walk') {
          const oldBottom = e.y + e.h;
          e.state = 'shell'; e.vx = 0; e.h = 16; e.shellTimer = 300;
          e.y = oldBottom - 16; // anchor bottom to prevent ground clip
        } else if (e.state === 'shellMoving') {
          e.state = 'shell'; e.vx = 0; e.shellTimer = 300;
        }
      } else if (e.type === 'paratroopa') {
        // Stomp removes wings, becomes normal green koopa walking
        e.type = 'koopa'; e.state = 'walk'; e.vx = -0.5;
        e.vy = 0; e.facing = -1;
      }
    } else {
      // Damage player
      damagePlayer();
    }
  }
}

function damagePlayer() {
  if (player.invincible > 0 || player.starPower > 0) return;
  if (player.power > 0) {
    player.power = 0; player.shrinkTimer = 48;
    player.invincible = 120;
    // Shrink: keep feet at same position
    const oldBottom = player.y + player.h;
    player.h = 16;
    player.y = oldBottom - 16;
    sfxBump();
  } else {
    killPlayer();
  }
}

function killPlayer() {
  if (player.dead) return;
  player.dead = true; player.vy = JUMP_VEL;
  player.vx = 0; sfxDie(); stopBGM();
  stateTimer = 120; gameState = 'dying';
}

// ============================================================
// ITEMS UPDATE
// ============================================================
function updateItems() {
  for (let i = items.length - 1; i >= 0; i--) {
    const it = items[i];
    if (it.rising) {
      it.y -= 1;
      if (it.y <= it.targetY) { it.y = it.targetY; it.rising = false; }
      // Check collection even while rising
      if (checkItemCollect(it)) { items.splice(i, 1); }
      continue;
    }

    if (it.type === 'mushroom') {
      it.vy += GRAVITY;
      if (it.vy > MAX_FALL) it.vy = MAX_FALL;
      it.x += it.vx;
      // Wall bounce
      const wtx = it.vx > 0 ? Math.floor((it.x+14)/TILE) : Math.floor(it.x/TILE);
      const wty = Math.floor((it.y+7)/TILE);
      if (isSolid(wtx, wty)) it.vx = -it.vx;
      it.y += it.vy;
      // Ground
      const bty = Math.floor((it.y+14)/TILE);
      for (let tx = Math.floor(it.x/TILE); tx <= Math.floor((it.x+14)/TILE); tx++) {
        if (isSolid(tx, bty)) { it.y = bty*TILE-14; it.vy = 0; }
      }
    } else if (it.type === 'star') {
      it.vy += GRAVITY;
      it.x += it.vx; it.y += it.vy; it.animTimer++;
      const bty = Math.floor((it.y+14)/TILE);
      if (isSolid(Math.floor((it.x+7)/TILE), bty)) { it.y = bty*TILE-14; it.vy = -6.0; }
      const wtx = it.vx > 0 ? Math.floor((it.x+14)/TILE) : Math.floor(it.x/TILE);
      if (isSolid(wtx, Math.floor((it.y+7)/TILE))) it.vx = -it.vx;
    } else if (it.type === 'fireflower') {
      it.animTimer++;
    }

    if (checkItemCollect(it)) { items.splice(i, 1); continue; }
    if (it.y > level.height*TILE || it.x < camera.x-80) { items.splice(i, 1); }
  }
}

function checkItemCollect(it) {
  if (!player || player.dead) return false;
  if (!(player.x < it.x+14 && player.x+player.w > it.x && player.y < it.y+14 && player.y+player.h > it.y)) return false;

  if (it.type === 'mushroom') {
    player.power = 1;
    if (player.h < 28) {
      const bottomY = player.y + player.h; // keep feet position
      player.h = 28;
      player.y = bottomY - 28;
    }
    player.growTimer = 48; score += 1000;
    addFloatingText(it.x, it.y-8, '1000', '#00FF00'); sfxPowerup();
  } else if (it.type === 'fireflower') {
    player.power = 2;
    if (player.h < 28) {
      const bottomY = player.y + player.h;
      player.h = 28;
      player.y = bottomY - 28;
    }
    player.growTimer = 48; score += 1000;
    addFloatingText(it.x, it.y-8, '1000', '#FF4500'); sfxPowerup();
  } else if (it.type === 'star') {
    player.starPower = STAR_DURATION; player.invincible = STAR_DURATION;
    score += 1000; addFloatingText(it.x, it.y-8, '1000', '#FFD700'); sfxPowerup();
    // Star music - fast tempo
    stopBGM(); startStarBGM();
  }
  return true;
}

// ============================================================
// FLAGPOLE
// ============================================================
let flagState = { phase: 'descend' };

function checkFlagpole() {
  if (gameState !== 'playing') return;
  for (let y = 0; y < level.height; y++) {
    const startX = Math.max(0, Math.floor(camera.x/TILE));
    const endX = Math.min(level.width, startX + COLS + 2);
    for (let x = startX; x < endX; x++) {
      const t = tileAt(x, y);
      if (t === FLAG_POLE || t === FLAG_TOP) {
        const poleX = x * TILE;
        if (player.x + player.w > poleX + 4 && player.x < poleX + 12) {
          gameState = 'flagpole'; stopBGM();
          flagState = { phase: 'descend', walkTarget: (x+5)*TILE + 8 };
          player.vx = 0; player.vy = 0;
          player.x = poleX - player.w + 6;
          // Score by height
          const ratio = 1 - Math.max(0, Math.min(1, (player.y - 5*TILE) / (12*TILE - 5*TILE)));
          const flagScore = Math.round(ratio * 4900 + 100);
          score += flagScore;
          addFloatingText(player.x, player.y-16, String(flagScore), '#FFD700');
          sfxFlagpole();
          return;
        }
      }
    }
  }
}

function updateFlagpole() {
  if (flagState.phase === 'descend') {
    player.y += 2;
    if (player.y + player.h >= 12*TILE) {
      player.y = 12*TILE - player.h;
      flagState.phase = 'walk'; player.facing = 1;
    }
  } else if (flagState.phase === 'walk') {
    player.x += 1.5;
    player.animTimer++;
    if (player.animTimer > 6) { player.animFrame = (player.animFrame+1)%3; player.animTimer = 0; }
    if (player.x >= flagState.walkTarget) flagState.phase = 'timebonus';
  } else if (flagState.phase === 'timebonus') {
    if (levelTime > 0) { levelTime = Math.max(0, levelTime-2); score += 100; }
    else { gameState = 'levelClear'; stateTimer = 180; sfxLevelClear(); }
  }
}

// ============================================================
// PARTICLES UPDATE
// ============================================================
function updateParticles() {
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
  // Update bumped blocks
  for (let i = bumpedBlocks.length-1; i >= 0; i--) {
    const b = bumpedBlocks[i];
    b.timer++;
    // Smooth bump: rise fast then return
    const half = b.maxTimer / 2;
    if (b.timer <= half) {
      b.offsetY = -(b.timer / half) * 6; // rise up 6 pixels
    } else {
      b.offsetY = -((b.maxTimer - b.timer) / half) * 6; // return
    }
    if (b.timer >= b.maxTimer) bumpedBlocks.splice(i, 1);
  }
  for (let i = floatingTexts.length-1; i >= 0; i--) {
    const ft = floatingTexts[i];
    ft.y += ft.vy; ft.life--;
    if (ft.life <= 0) floatingTexts.splice(i, 1);
  }
}

// ============================================================
// RENDERING
// ============================================================
function drawScaled(sprite, x, y, w, h) {
  ctx.drawImage(sprite, x, y, (w||sprite.width)*S, (h||sprite.height)*S);
}

function drawTile(x, y, type) {
  const sx = Math.round((x*TILE - camera.x) * S);
  let sy = Math.round(y * TILE * S);
  const s = TILE * S;

  // Check for bump animation offset
  for (const b of bumpedBlocks) {
    if (b.tx === x && b.ty === y) { sy += Math.round(b.offsetY * S); break; }
  }

  if (sx < -s || sx > canvas.width) return;

  switch (type) {
    case GROUND: ctx.drawImage((level.bgType==='underground'||level.bgType==='castle') ? groundTileSpriteUG : groundTileSprite, sx, sy, s, s); break;
    case BRICK: ctx.drawImage((level.bgType==='underground'||level.bgType==='castle') ? brickTileSpriteUG : brickTileSprite, sx, sy, s, s); break;
    case QUESTION:
      const qf = Math.floor(globalTimer / 12) % 4;
      ctx.drawImage(questionSprites[qf], sx, sy, s, s);
      break;
    case USED: ctx.drawImage(usedBlockSprite, sx, sy, s, s); break;
    case HARD: ctx.drawImage(hardBlockSprite, sx, sy, s, s); break;
    case PIPE_TL: ctx.drawImage(pipeTL, sx, sy, s, s); break;
    case PIPE_TR: ctx.drawImage(pipeTR, sx, sy, s, s); break;
    case PIPE_BL: ctx.drawImage(pipeBL, sx, sy, s, s); break;
    case PIPE_BR: ctx.drawImage(pipeBR, sx, sy, s, s); break;
    case PLATFORM: ctx.drawImage(platformSprite, sx, sy, s, s); break;
    case FLAG_POLE:
      ctx.fillStyle = '#888'; ctx.fillRect(sx+6*S, sy, 4*S, s);
      ctx.fillStyle = '#BBB'; ctx.fillRect(sx+7*S, sy, 2*S, s);
      break;
    case FLAG_TOP:
      // Pole
      ctx.fillStyle = '#888'; ctx.fillRect(sx+6*S, sy+4*S, 4*S, s-4*S);
      ctx.fillStyle = '#BBB'; ctx.fillRect(sx+7*S, sy+4*S, 2*S, s-4*S);
      // Ball on top (golden)
      ctx.fillStyle = '#F8D830';
      ctx.beginPath(); ctx.arc(sx+8*S, sy+4*S, 3*S, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#E09010';
      ctx.beginPath(); ctx.arc(sx+8*S, sy+4*S, 2*S, 0, Math.PI*2); ctx.fill();
      // Flag (green triangle like NES)
      ctx.fillStyle = '#00A800';
      ctx.beginPath();
      ctx.moveTo(sx+10*S, sy+5*S);
      ctx.lineTo(sx+10*S+12*S, sy+5*S+5*S);
      ctx.lineTo(sx+10*S, sy+5*S+10*S);
      ctx.closePath(); ctx.fill();
      // Flag highlight
      ctx.fillStyle = '#00D800';
      ctx.beginPath();
      ctx.moveTo(sx+10*S, sy+6*S);
      ctx.lineTo(sx+10*S+8*S, sy+6*S+4*S);
      ctx.lineTo(sx+10*S, sy+6*S+8*S);
      ctx.closePath(); ctx.fill();
      break;
  }
}

function drawBackground() {
  ctx.fillStyle = level.bgColor;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (level.bgType === 'overworld') {
    const parallax1 = camera.x * 0.15;
    const parallax2 = camera.x * 0.08;
    const groundY = 13*TILE*S;

    // Big hill (background layer)
    for (let i = -1; i < 6; i++) {
      const hx = i * 380 - (parallax2 % 380);
      ctx.fillStyle = '#4A8E20';
      ctx.beginPath();
      ctx.arc(hx*S + 100*S, groundY, 70*S, Math.PI, 0);
      ctx.fill();
      // Hill stripe pattern
      ctx.fillStyle = '#5A9E30';
      ctx.beginPath();
      ctx.arc(hx*S + 100*S, groundY, 60*S, Math.PI, 0);
      ctx.fill();
    }

    // Small hills (midground)
    for (let i = -1; i < 8; i++) {
      const hx = i * 240 - (parallax1 % 240);
      ctx.fillStyle = '#4A8E20';
      ctx.beginPath();
      ctx.arc(hx*S + 60*S, groundY, 28*S, Math.PI, 0);
      ctx.fill();
      ctx.fillStyle = '#5A9E30';
      ctx.beginPath();
      ctx.arc(hx*S + 60*S, groundY, 22*S, Math.PI, 0);
      ctx.fill();
    }

    // Clouds (slow parallax)
    ctx.fillStyle = '#F8F8F8';
    for (let i = -1; i < 8; i++) {
      const cx2 = i * 200 - (parallax2 % 200);
      drawCloud(cx2*S + 20*S, 2.0*TILE*S, 3);
      drawCloud(cx2*S + 120*S, 1.2*TILE*S, 2);
      drawCloud(cx2*S + 70*S, 3.0*TILE*S, 1);
    }

    // Bushes (foreground parallax)
    for (let i = -1; i < 8; i++) {
      const bx = i * 260 - (parallax1 % 260);
      // 3-puff bush
      ctx.fillStyle = '#2A8E10';
      ctx.beginPath(); ctx.arc(bx*S + 40*S, groundY, 11*S, Math.PI, 0); ctx.fill();
      ctx.beginPath(); ctx.arc(bx*S + 54*S, groundY, 13*S, Math.PI, 0); ctx.fill();
      ctx.beginPath(); ctx.arc(bx*S + 68*S, groundY, 10*S, Math.PI, 0); ctx.fill();
      // Highlight
      ctx.fillStyle = '#5ABE40';
      ctx.beginPath(); ctx.arc(bx*S + 40*S, groundY-1*S, 7*S, Math.PI, 0); ctx.fill();
      ctx.beginPath(); ctx.arc(bx*S + 54*S, groundY-1*S, 9*S, Math.PI, 0); ctx.fill();
      ctx.beginPath(); ctx.arc(bx*S + 68*S, groundY-1*S, 6*S, Math.PI, 0); ctx.fill();
      // 1-puff bush elsewhere
      ctx.fillStyle = '#2A8E10';
      ctx.beginPath(); ctx.arc(bx*S + 160*S, groundY, 9*S, Math.PI, 0); ctx.fill();
      ctx.fillStyle = '#5ABE40';
      ctx.beginPath(); ctx.arc(bx*S + 160*S, groundY-1*S, 5*S, Math.PI, 0); ctx.fill();
    }
  } else if (level.bgType === 'castle') {
    // Castle - dark with red/orange tint
    ctx.strokeStyle = 'rgba(100,40,20,0.08)';
    ctx.lineWidth = 1;
    for (let x = 0; x < COLS+2; x++) {
      const lx = Math.round(x*TILE*S - (camera.x*S)%(TILE*S));
      ctx.beginPath(); ctx.moveTo(lx, 0); ctx.lineTo(lx, canvas.height); ctx.stroke();
    }
    for (let y = 0; y < ROWS+1; y++) {
      const ly = Math.round(y*TILE*S);
      ctx.beginPath(); ctx.moveTo(0, ly); ctx.lineTo(canvas.width, ly); ctx.stroke();
    }
    // Torch-like flickering light
    const flicker = Math.sin(globalTimer * 0.15) * 0.02 + 0.04;
    ctx.fillStyle = `rgba(255,100,20,${flicker})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  } else {
    // Underground - dark with subtle blue-tinted brick wall feel
    ctx.strokeStyle = 'rgba(80,80,120,0.06)';
    ctx.lineWidth = 1;
    for (let x = 0; x < COLS+2; x++) {
      const lx = Math.round(x*TILE*S - (camera.x*S)%(TILE*S));
      ctx.beginPath(); ctx.moveTo(lx, 0); ctx.lineTo(lx, canvas.height); ctx.stroke();
    }
    for (let y = 0; y < ROWS+1; y++) {
      const ly = Math.round(y*TILE*S);
      ctx.beginPath(); ctx.moveTo(0, ly); ctx.lineTo(canvas.width, ly); ctx.stroke();
    }
    // Lava glow at bottom of gaps
    if (level.grid) {
      const startCol = Math.max(0, Math.floor(camera.x/TILE));
      const endCol = Math.min(level.width, startCol+COLS+2);
      for (let x = startCol; x < endCol; x++) {
        if (level.grid[13][x] === EMPTY && level.grid[14][x] === EMPTY) {
          const gx = Math.round((x*TILE - camera.x) * S);
          const gy = 14*TILE*S;
          // Lava shimmer
          const shimmer = Math.sin(globalTimer * 0.05 + x * 0.8) * 0.15 + 0.35;
          ctx.fillStyle = `rgba(255,60,0,${shimmer})`;
          ctx.fillRect(gx, gy, TILE*S, TILE*S);
          ctx.fillStyle = `rgba(255,180,0,${shimmer*0.5})`;
          ctx.fillRect(gx, gy-TILE*S*0.5, TILE*S, TILE*S*0.5);
        }
      }
    }
  }
}

function drawCloud(x, y, puffs) {
  for (let i = 0; i < puffs; i++) {
    ctx.beginPath();
    ctx.arc(x + i*14*S, y, 10*S, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x + i*14*S + 4*S, y - 7*S, 9*S, 0, Math.PI*2);
    ctx.fill();
  }
}

function drawPlayer() {
  if (player.dead && gameState === 'dying') {
    const px2 = Math.round((player.x - camera.x) * S);
    const py2 = Math.round(player.y * S);
    ctx.save();
    ctx.translate(px2, py2);
    ctx.scale(1, -1);
    ctx.drawImage(marioDeadSprite, 0, -16*S, 16*S, 16*S);
    ctx.restore();
    return;
  }

  // Flicker during invincibility
  if (player.invincible > 0 && !player.starPower && Math.floor(player.invincible/2) % 2 === 0) return;
  if (player.growTimer > 0 && Math.floor(player.growTimer/3) % 2 === 0) return;
  if (player.shrinkTimer > 0 && Math.floor(player.shrinkTimer/3) % 2 === 0) return;

  const px2 = Math.round((player.x - camera.x) * S - 2*S); // center 12px hitbox in 16px sprite

  const sprites = player.power === 2 ? marioSprites.fire : marioSprites.normal;
  const dir = player.facing > 0 ? 'right' : 'left';

  let sprite, drawY;
  if (player.h > 16) {
    // Big mario: sprite is 16x32 canvas, content starts at row 14
    // Offset up by 4px so visual bottom aligns with hitbox bottom (h=28)
    drawY = Math.round((player.y - 4) * S);
    if (player.crouching) {
      // Draw crouching: squish the sprite vertically
      sprite = sprites.big[0][dir];
      drawY = Math.round((player.y + 6) * S); // lower position for squish effect
    } else if (!player.onGround) sprite = sprites.big[3][dir];
    else if (player.animFrame === 0) sprite = sprites.big[0][dir];
    else sprite = sprites.big[player.animFrame === 1 ? 1 : 2][dir];
  } else {
    // Small mario: 16x16 canvas, matches h=16
    drawY = Math.round(player.y * S);
    if (!player.onGround) sprite = sprites.small[3][dir];
    else if (player.skidding) sprite = sprites.small[4][dir];
    else if (player.animFrame === 0) sprite = sprites.small[0][dir];
    else sprite = sprites.small[player.animFrame === 1 ? 1 : 2][dir];
  }

  // Star rainbow effect
  if (player.starPower > 0) {
    ctx.save();
    const hue = (globalTimer * 12) % 360;
    ctx.filter = `hue-rotate(${hue}deg) saturate(2) brightness(1.3)`;
    if (player.crouching) {
      ctx.drawImage(sprite, px2, drawY, sprite.width*S, sprite.height*S*0.65);
    } else {
      ctx.drawImage(sprite, px2, drawY, sprite.width*S, sprite.height*S);
    }
    ctx.restore();
  } else if (player.crouching) {
    ctx.drawImage(sprite, px2, drawY, sprite.width*S, sprite.height*S*0.65);
  } else {
    ctx.drawImage(sprite, px2, drawY, sprite.width*S, sprite.height*S);
  }
}

function drawEntities() {
  for (const e of entities) {
    if (!e.active) continue;
    const ex = Math.round((e.x - camera.x) * S);
    const ey = Math.round(e.y * S);
    if (ex < -20*S || ex > canvas.width + 20*S) continue;

    if (e.type === 'goomba') {
      if (e.flipped) {
        ctx.save();
        ctx.translate(ex, ey + e.h*S);
        ctx.scale(1, -1);
        ctx.drawImage(goombaSprites[0], -1*S, 0, 16*S, 16*S);
        ctx.restore();
      } else if (e.squished) {
        ctx.drawImage(goombaSquished, ex-1*S, ey, 16*S, 8*S);
      } else {
        ctx.drawImage(goombaSprites[e.animFrame], ex-1*S, ey, 16*S, 16*S);
      }
    } else if (e.type === 'koopa') {
      if (e.flipped) {
        ctx.save();
        ctx.translate(ex, ey + e.h*S);
        ctx.scale(1, -1);
        ctx.drawImage(koopaShellSprite, -1*S, 0, 16*S, 16*S);
        ctx.restore();
      } else if (e.state === 'shell' || e.state === 'shellMoving') {
        const shellX = ex - 1*S;
        const shellY = ey;
        if (e.state === 'shellMoving') {
          // Spin effect
          const spinFrame = Math.floor(globalTimer/2) % 4;
          ctx.save();
          ctx.translate(shellX + 8*S, shellY + 8*S);
          ctx.rotate(spinFrame * Math.PI/2);
          ctx.drawImage(koopaShellSprite, -8*S, -8*S, 16*S, 16*S);
          ctx.restore();
        } else {
          // Wobble near end
          if (e.shellTimer < 90 && Math.floor(e.shellTimer/6) % 2) {
            ctx.save();
            ctx.translate(shellX + 8*S, shellY + 8*S);
            ctx.rotate(Math.sin(globalTimer*0.3)*0.15);
            ctx.drawImage(koopaShellSprite, -8*S, -8*S, 16*S, 16*S);
            ctx.restore();
          } else {
            ctx.drawImage(koopaShellSprite, shellX, shellY, 16*S, 16*S);
          }
        }
      } else {
        // Walking - sprite is 16x24, hitbox is 14x22
        const dir = e.vx > 0 ? 'right' : 'left';
        const kSprite = koopaWalkSprites[e.animFrame][dir];
        ctx.drawImage(kSprite, ex-1*S, ey-2*S, 16*S, 24*S);
      }
    } else if (e.type === 'redkoopa') {
      if (e.flipped) {
        ctx.save();
        ctx.translate(ex, ey + e.h*S);
        ctx.scale(1, -1);
        ctx.drawImage(redKoopaShellSprite, -1*S, 0, 16*S, 16*S);
        ctx.restore();
      } else if (e.state === 'shell' || e.state === 'shellMoving') {
        const shellX = ex - 1*S;
        const shellY = ey;
        if (e.state === 'shellMoving') {
          const spinFrame = Math.floor(globalTimer/2) % 4;
          ctx.save();
          ctx.translate(shellX + 8*S, shellY + 8*S);
          ctx.rotate(spinFrame * Math.PI/2);
          ctx.drawImage(redKoopaShellSprite, -8*S, -8*S, 16*S, 16*S);
          ctx.restore();
        } else {
          if (e.shellTimer < 90 && Math.floor(e.shellTimer/6) % 2) {
            ctx.save();
            ctx.translate(shellX + 8*S, shellY + 8*S);
            ctx.rotate(Math.sin(globalTimer*0.3)*0.15);
            ctx.drawImage(redKoopaShellSprite, -8*S, -8*S, 16*S, 16*S);
            ctx.restore();
          } else {
            ctx.drawImage(redKoopaShellSprite, shellX, shellY, 16*S, 16*S);
          }
        }
      } else {
        const dir = e.vx > 0 ? 'right' : 'left';
        const kSprite = redKoopaWalkSprites[e.animFrame][dir];
        ctx.drawImage(kSprite, ex-1*S, ey-2*S, 16*S, 24*S);
      }
    } else if (e.type === 'buzzy') {
      if (e.flipped) {
        ctx.save();
        ctx.translate(ex, ey + e.h*S);
        ctx.scale(1, -1);
        ctx.drawImage(buzzyShellSprite, -1*S, 0, 16*S, 16*S);
        ctx.restore();
      } else if (e.state === 'shell' || e.state === 'shellMoving') {
        const shellX = ex - 1*S;
        const shellY = ey;
        if (e.state === 'shellMoving') {
          const spinFrame = Math.floor(globalTimer/2) % 4;
          ctx.save();
          ctx.translate(shellX + 8*S, shellY + 8*S);
          ctx.rotate(spinFrame * Math.PI/2);
          ctx.drawImage(buzzyShellSprite, -8*S, -8*S, 16*S, 16*S);
          ctx.restore();
        } else {
          if (e.shellTimer < 90 && Math.floor(e.shellTimer/6) % 2) {
            ctx.save();
            ctx.translate(shellX + 8*S, shellY + 8*S);
            ctx.rotate(Math.sin(globalTimer*0.3)*0.15);
            ctx.drawImage(buzzyShellSprite, -8*S, -8*S, 16*S, 16*S);
            ctx.restore();
          } else {
            ctx.drawImage(buzzyShellSprite, shellX, shellY, 16*S, 16*S);
          }
        }
      } else {
        const dir = e.vx > 0 ? 'right' : 'left';
        ctx.drawImage(buzzyWalkSprites[e.animFrame][dir], ex-1*S, ey, 16*S, 16*S);
      }
    } else if (e.type === 'paratroopa') {
      if (e.flipped) {
        ctx.save();
        ctx.translate(ex, ey + e.h*S);
        ctx.scale(1, -1);
        ctx.drawImage(koopaShellSprite, -1*S, 0, 16*S, 16*S);
        ctx.restore();
      } else {
        // Draw koopa body
        const dir = e.vx > 0 ? 'right' : 'left';
        const kSprite = koopaWalkSprites[e.animFrame][dir];
        ctx.drawImage(kSprite, ex-1*S, ey-2*S, 16*S, 24*S);
        // Draw wings (flapping)
        const wingY = ey + 2*S + (e.wingFrame ? -2*S : 2*S);
        const wingOffsetL = ex - 7*S;
        const wingOffsetR = ex + 12*S;
        ctx.drawImage(wingSprite, wingOffsetL, wingY, 8*S, 8*S);
        ctx.save();
        ctx.translate(wingOffsetR + 4*S, wingY + 4*S);
        ctx.scale(-1, 1);
        ctx.drawImage(wingSprite, -4*S, -4*S, 8*S, 8*S);
        ctx.restore();
      }
    } else if (e.type === 'piranha') {
      if (e.state !== 'hidden') {
        ctx.save();
        // Clip: hide the part that would be inside the pipe
        const pipeTopY = Math.round(e.baseY * S);
        ctx.beginPath();
        ctx.rect(0, 0, canvas.width, pipeTopY);
        ctx.clip();
        ctx.drawImage(piranhaSprites[e.animFrame], ex-1*S, ey, 16*S, 24*S);
        ctx.restore();
      }
    }
  }
}

// ============================================================
// BOSS RENDERING
// ============================================================
function drawBossArena() {
  if (!level.boss) return;

  // Draw bridge tiles
  for (const bt of bridgeTiles) {
    if (!bt.active) continue;
    const bx = Math.round((bt.tx * TILE - camera.x) * S);
    const by = Math.round(bt.ty * TILE * S);
    ctx.drawImage(bridgeTileSprite, bx, by, TILE * S, TILE * S);
  }

  // Draw lava under bridge
  const boss = level.boss;
  for (let x = boss.lavaStart; x <= boss.lavaEnd; x++) {
    const lx = Math.round((x * TILE - camera.x) * S);
    for (let y = boss.bridgeRow + 1; y <= 14; y++) {
      const ly = Math.round(y * TILE * S);
      ctx.drawImage(lavaTileSprite, lx, ly, TILE * S, TILE * S);
    }
    // Lava shimmer on top
    const shimmer = Math.sin(globalTimer * 0.08 + x * 0.5) * 0.3 + 0.4;
    ctx.fillStyle = `rgba(255,200,0,${shimmer * 0.3})`;
    ctx.fillRect(Math.round((x * TILE - camera.x) * S), Math.round((boss.bridgeRow + 1) * TILE * S),
      TILE * S, 4 * S);
  }

  // Draw axe
  if (axeObj && axeObj.active) {
    const ax = Math.round((axeObj.x - camera.x) * S);
    const ay = Math.round(axeObj.y * S);
    // Shimmer/glow effect
    const glow = Math.sin(globalTimer * 0.1) * 0.3 + 0.5;
    ctx.save();
    ctx.globalAlpha = glow;
    ctx.fillStyle = '#FFD700';
    ctx.fillRect(ax - 2 * S, ay - 2 * S, 20 * S, 20 * S);
    ctx.restore();
    ctx.drawImage(axeSprite, ax, ay, 16 * S, 16 * S);
  }

  // Draw Bowser
  if (bowser && (bowser.alive || bossState === 'bowser_falling')) {
    const bx = Math.round((bowser.x - camera.x) * S) - 2 * S;
    const by = Math.round(bowser.y * S) - 2 * S;
    const dir = bowser.facing > 0 ? 'right' : 'left';

    let sprite;
    if (bowser.hurtTimer > 0 && Math.floor(bowser.hurtTimer / 2) % 2) {
      sprite = bowserHurtSprite[dir];
    } else if (bowser.state === 'fire' && bowser.stateTimer > 15) {
      sprite = bowserFireSprite[dir];
    } else {
      sprite = bowserWalkSprites[bowser.animFrame][dir];
    }
    ctx.drawImage(sprite, bx, by, 32 * S, 32 * S);

    // HP bar
    if (bowser.alive && bossState === 'active') {
      const barW = 40 * S, barH = 4 * S;
      const barX = bx + 16 * S - barW / 2;
      const barY = by - 8 * S;
      ctx.fillStyle = '#333';
      ctx.fillRect(barX, barY, barW, barH);
      ctx.fillStyle = bowser.hp > 2 ? '#00D800' : bowser.hp > 1 ? '#F8D830' : '#D00000';
      ctx.fillRect(barX + S, barY + S, (barW - 2 * S) * (bowser.hp / 5), barH - 2 * S);
    }
  }

  // Draw Bowser fireballs
  for (const fb of bowserFireballs) {
    const fx = Math.round((fb.x - camera.x) * S);
    const fy = Math.round(fb.y * S);
    const frame = Math.floor(fb.animTimer / 3) % 4;
    ctx.drawImage(bowserFireballSprites[frame], fx, fy, 16 * S, 8 * S);
  }

  // Draw hammers
  for (const h of bowserHammers) {
    const hx = Math.round((h.x - camera.x) * S);
    const hy = Math.round(h.y * S);
    const frame = Math.floor(h.animTimer / 4) % 4;
    ctx.drawImage(hammerSprites[frame], hx, hy, 8 * S, 16 * S);
  }

  // Victory text
  if (bossState === 'victory' && bowserVictoryTimer > 0) {
    ctx.save();
    ctx.textAlign = 'center';
    ctx.font = `bold ${14 * S}px monospace`;
    // Pulsing effect
    const pulse = Math.sin(globalTimer * 0.1) * 0.2 + 1;
    ctx.save();
    ctx.translate(canvas.width / 2, canvas.height * 0.35);
    ctx.scale(pulse, pulse);
    ctx.fillStyle = '#000';
    ctx.fillText('BOWSER DEFEATED!', 2 * S, 2 * S);
    ctx.fillStyle = '#F8D830';
    ctx.fillText('BOWSER DEFEATED!', 0, 0);
    ctx.restore();

    ctx.fillStyle = '#FFF';
    ctx.font = `${8 * S}px monospace`;
    ctx.fillText('PEACE IS RESTORED!', canvas.width / 2, canvas.height * 0.45);
    ctx.restore();
  }
}

function drawItems() {
  for (const it of items) {
    const ix = Math.round((it.x - camera.x) * S);
    const iy = Math.round(it.y * S);

    if (it.type === 'mushroom') {
      ctx.drawImage(mushroomSprite, ix, iy, 16*S, 16*S);
    } else if (it.type === 'fireflower') {
      const frame = Math.floor(it.animTimer/6) % 4;
      ctx.drawImage(fireFlowerSprites[frame], ix, iy, 16*S, 16*S);
    } else if (it.type === 'star') {
      const frame = Math.floor(globalTimer / 3) % 8;
      ctx.drawImage(starSpriteFrames[frame], ix, iy, 16*S, 16*S);
    }
  }
}

function drawFireballs() {
  for (const fb of fireballs) {
    const fx = Math.round((fb.x - camera.x) * S);
    const fy = Math.round(fb.y * S);
    const frame = Math.floor(fb.animTimer/3) % 4;
    const colors = ['#FF4500','#FFD700','#FF6600','#FFF'];

    ctx.save();
    ctx.translate(fx + 4*S, fy + 4*S);
    ctx.rotate(fb.animTimer * 0.3);
    // Outer glow
    ctx.fillStyle = colors[frame];
    ctx.beginPath(); ctx.arc(0, 0, 4*S, 0, Math.PI*2); ctx.fill();
    // Inner bright core
    ctx.fillStyle = '#FFF';
    ctx.beginPath(); ctx.arc(0, 0, 2*S, 0, Math.PI*2); ctx.fill();
    // Orange ring
    ctx.fillStyle = '#FFD700';
    ctx.beginPath(); ctx.arc(0, 0, 3*S, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#FFF';
    ctx.beginPath(); ctx.arc(0, 0, 1.5*S, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

function drawParticles() {
  for (const p of particles) {
    if (p.color === 'transparent') continue;
    const px2 = Math.round((p.x - camera.x) * S);
    const py2 = Math.round(p.y * S);
    if (p.color === 'coin') {
      // Spinning coin animation
      const frame = Math.floor((p.maxLife - p.life) / 4) % 4;
      ctx.drawImage(spinCoinSprites[frame], px2, py2, 8*S, 16*S);
    } else {
      ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
      ctx.fillStyle = p.color;
      ctx.fillRect(px2, py2, p.size*S, p.size*S);
      ctx.globalAlpha = 1;
    }
  }
}

function drawFloatingTexts() {
  for (const ft of floatingTexts) {
    const fx = Math.round((ft.x - camera.x) * S);
    const fy = Math.round(ft.y * S);
    ctx.globalAlpha = Math.min(1, ft.life / 15);
    ctx.fillStyle = ft.color;
    ctx.font = `bold ${8*S}px monospace`;
    ctx.textAlign = 'center';
    // Shadow
    ctx.fillStyle = '#000';
    ctx.fillText(ft.text, fx+S, fy+S);
    ctx.fillStyle = ft.color;
    ctx.fillText(ft.text, fx, fy);
  }
  ctx.globalAlpha = 1;
}
